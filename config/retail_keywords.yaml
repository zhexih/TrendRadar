alert_thresholds:
  red_alert: 单品类日热度>20 或 日环比+100%（说明：基于实测数据校准，今日最高21分来自消费/油价信号）
  yellow_alert: 单品类日热度>10 或 日环比+50%
  green: 日热度0-10，正常波动范围内
